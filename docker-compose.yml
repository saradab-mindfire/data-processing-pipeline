services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      worker:
        condition: service_started
    env_file:
      - .env
    environment:
      SERVER_ADDR: ${DOCKER_SERVER_ADDR:-0.0.0.0:9090}
      DB_HOST: ${DOCKER_DB_HOST:-db}
      WORKER_URL: ${DOCKER_WORKER_URL:-http://worker:9091}
    ports:
      - "9090:9090"
    volumes:
      - ./exports:/app/exports

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: ${DOCKER_DB_HOST:-db}
      WORKER_ADDR: ${DOCKER_WORKER_ADDR:-0.0.0.0:9091}
    ports:
      - "9091:9091"
    volumes:
      - ./exports:/app/exports

volumes:
  db_data:
