services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: data-processing-pipeline
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d data-processing-pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_ADDR: 0.0.0.0:9090
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: data-processing-pipeline
      DB_PORT: 5432
      DB_SSLMODE: disable
    ports:
      - "9090:9090"
    volumes:
      - ./exports:/app/exports

volumes:
  db_data:
